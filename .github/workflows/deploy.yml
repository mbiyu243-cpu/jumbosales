name: Deploy Jumbo Sales

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: 161.97.176.220
  SERVER_USER: jumbosales
  DEPLOY_PATH: /var/www/jumbosales

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Frontend Build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://jumbosalesbackend.qpcgroupafrica.com:8007
        run: npm run build

      # Backend Build
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Build backend
        working-directory: backend
        run: |
          go mod tidy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o jumbo-api cmd/main.go

      # Deploy to Server
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          rsync -avz --delete frontend/dist/ ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/frontend/

      - name: Deploy backend
        run: |
          rsync -avz backend/jumbo-api ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/backend/
          rsync -avz backend/.env.example ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/backend/

      - name: Restart backend service
        run: |
          ssh ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} "sudo systemctl restart jumbo-api || echo 'Service not yet configured'"

      - name: Deployment complete
        run: echo "✅ Deployed to ${{ env.SERVER_HOST }}"
